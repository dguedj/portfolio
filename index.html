<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Mes voyages</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="navbar">
  <h1 class="logo">Mes Voyages</h1>
  <nav>
    <ul class="menu">
      <li onclick="showCountry('Taglit')">Taglit</li>
      <li onclick="showCountry('NYC')">NYC</li>
      <li onclick="showCountry('Egypt')">Egypt</li>
      <li onclick="showCountry('Greece')">Greece</li>
      <li onclick="showCountry('Geneve')">Geneve</li>

    </ul>
  </nav>
</header>

<div class="container">
  
  <section id="NYC" class="gallery">
    <!-- Images will be generated by JavaScript -->        
  </section>

  <section id="Geneve" class="gallery">
    <!-- Images will be generated by JavaScript -->   
  </section>

  <section id="Greece" class="gallery">
    <!-- Images will be generated by JavaScript -->   
  </section>

  <section id="Egypt" class="gallery">
    <!-- Images will be generated by JavaScript -->   
  </section>

  <section id="Taglit" class="gallery">
    <!-- Images will be generated by JavaScript -->   
  </section>

</div>

<div id="overlay" onclick="hideOverlay()">
  <img id="overlay-img" src="" alt="photo">
</div>

<script src="script.js">
  function generateImages(sectionId, start, end) {
    const gallery = document.getElementById(sectionId);

    for (let i = start; i <= end; i++) {
      const img = document.createElement("img");
      img.src = `dataset/image${i}.jpg`;
      img.alt = "photo";
      gallery.appendChild(img);
    }
  }

  generateImages("NYC", 1, 18);
  generateImages("Geneve", 19, 22);
  generateImages("Greece", 23, 25);
  generateImages("Egypt", 26, 29);
  generateImages("Taglit", 30, 41);
</script>
<link rel="stylesheet" href="portfolio.css">
</body>
</html>
